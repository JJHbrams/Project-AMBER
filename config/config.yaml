# Runtime settings for memory tiers and Copilot invocation.
# You can override these values in ~/.engram/user.config.yaml.

db:
  root_dir: "D:/intel_engram"

memory:
  scope:
    default_main: "default:main"
    default_fallback: "default:main"
    default_global: "global:main"
    project_prefix: "project:"
    discord_prefix: "discord:"

  short_term:
    limit_turns: 8
    within_minutes: 120
    max_turn_chars: 80

  working:
    ttl_hours: 48
    max_compact_length: 900
    prompt_summary_max_chars: 240
    store_summary_max_chars: 1200
    store_open_intents_max_chars: 600
    user_clip_chars: 120
    assistant_clip_chars: 160

  long_term:
    search_limit: 2
    item_max_chars: 100

  wiki_reminder:
    # 세션 시작 시 user_query와 유사한 wiki 노트를 자동 리마인드
    enabled: true
    top_k: 3
    threshold: 0.45 # long_term KG snippet(0.35)보다 높게 — 고신뢰도 hits만
    item_max_chars: 120
    # project 타입은 _kg_context_snippet에서 이미 처리 — 중복 제외
    exclude_types:
      - project

sync:
  # post-session KG sync 워치독 타임아웃 (초). 이 시간 초과 시 강제 취소.
  # 오케스트레이터만 trigger_sync=True로 호출해야 한다; subagent는 trigger_sync=False 전달.
  watchdog_timeout_secs: 240
  # 마지막 sync 완료 후 재실행 최소 간격 (초). 짧은 시간 내 중복 실행 방지.
  cooldown_secs: 300
  # post-session memories 증분 동기화 배치 크기.
  memories_batch_size: 300

mcp:
  # Overlay가 관리하는 MCP HTTP(SSE) 기본 포트.
  http_port: 17385
  # VS Code 재연결 안정성을 위해 기본 전송은 streamable-http 권장.
  # 허용값: sse | streamable-http
  transport: streamable-http
  # Overlay 생존 중 리스너 헬스체크 주기(초).
  healthcheck_interval_secs: 5
  # 연속 실패 횟수 도달 시 MCP + 종속 리스너 재기동.
  healthcheck_fail_threshold: 3
  # Overlay 시작 직후 초기화 구간 유예(초).
  healthcheck_start_delay_secs: 15
  # 재기동 난사 방지 최소 간격(초).
  restart_cooldown_secs: 8
  # 재기동 후 리스너 준비 대기 시간(초).
  ready_timeout_secs: 20

session:
  # CLI 공급자가 시작될 때 자동으로 engram 컨텍스트를 주입할지 여부
  # 활성화 시 세션 시작마다 추가 컨텍스트 토큰이 소모됩니다
  auto_inject: false

copilot:
  model: "claude-sonnet-4.6"
  allow_all_tools: true

tools:
  # MCP에 노출하지 않을 툴 목록. 함수 자체는 유지되므로 내부 호출에는 영향 없음.
  # 사용자는 ~/.engram/user.config.yaml의 tools.disabled 로 오버라이드 가능.
  disabled:
    - engram_save_message
    - engram_get_identity
    - engram_get_persona
    - engram_get_themes
    - engram_update_persona
    - engram_get_persona_status
    - engram_apply_reflection
    - engram_prepare_reflection
    - engram_list_memories
    - engram_get_activities
    - engram_status
    - kg_list_nodes
    - kg_semantic_neighbors
    - memories_sync
    - engram_consult_engram
